<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000;
            color: #fff;
        }
        canvas {
            border: 1px solid #fff;
        }
        @media (max-width: 480px) {
            canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;

        let leftPaddle = { x: 0, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight }; 
        let rightPaddle = { x: canvas.width - paddleWidth, y: (canvas.height - paddleHeight) / 2, width: paddleWidth, height: paddleHeight }; 
        let ball = { x: canvas.width / 2, y: canvas.height / 2, radius: ballSize / 2, speedX: 5, speedY: 5 }; 

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = '#00f';
            context.fillRect(leftPaddle.x, leftPaddle.y, leftPaddle.width, leftPaddle.height);
            context.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.width, rightPaddle.height);
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2, false);
            context.fill();
        }

        function update() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;
            // Ball collision with top and bottom
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.speedY = -ball.speedY;
            }
            // Ball collision with paddles
            if (ball.x - ball.radius < leftPaddle.x + leftPaddle.width && ball.y > leftPaddle.y && ball.y < leftPaddle.y + leftPaddle.height) {
                ball.speedX = -ball.speedX;
            }
            if (ball.x + ball.radius > rightPaddle.x && ball.y > rightPaddle.y && ball.y < rightPaddle.y + rightPaddle.height) {
                ball.speedX = -ball.speedX;
            }
            // Reset ball if it goes out of bounds
            if (ball.x + ball.radius < 0 || ball.x - ball.radius > canvas.width) {
                ball.x = canvas.width / 2;
                ball.y = canvas.height / 2;
            }
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('mousemove', (event) => {
            const mouseY = event.clientY - canvas.getBoundingClientRect().top;
            leftPaddle.y = mouseY - paddleHeight / 2;
            if (leftPaddle.y < 0) leftPaddle.y = 0;
            if (leftPaddle.y + paddleHeight > canvas.height) leftPaddle.y = canvas.height - paddleHeight;
        });

        gameLoop();
    </script>
</body>
</html>
