<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: black;
            margin: 0;
            color: white;
        }
        canvas {
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const context = canvas.getContext('2d');

        // Ball properties
        let ballRadius = 10;
        let x = canvas.width / 2;
        let y = canvas.height / 2;
        let dx = 2;
        let dy = -2;

        // Paddle properties
        const paddleHeight = 75;
        const paddleWidth = 10;
        let paddleY = (canvas.height - paddleHeight) / 2;
        let rightPaddleY = (canvas.height - paddleHeight) / 2;

        // Score
        let playerScore = 0;
        let computerScore = 0;

        // Handling key presses
        document.addEventListener('mousemove', mouseMoveHandler);
        document.addEventListener('keydown', keyDownHandler);
        document.addEventListener('keyup', keyUpHandler);

        function mouseMoveHandler(e) {
            const relativeY = e.clientY - canvas.getBoundingClientRect().top;
            if (relativeY > 0 && relativeY < canvas.height) {
                paddleY = relativeY - paddleHeight / 2;
            }
        }

        function keyDownHandler(e) {
            if (e.key === "ArrowUp" && paddleY > 0) {
                paddleY -= 20;
            } else if (e.key === "ArrowDown" && (paddleY < canvas.height - paddleHeight)) {
                paddleY += 20;
            }
        }

        function keyUpHandler(e) {
            // Not needed for this game
        }

        function drawBall() {
            context.beginPath();
            context.arc(x, y, ballRadius, 0, Math.PI * 2);
            context.fillStyle = "white";
            context.fill();
            context.closePath();
        }

        function drawPaddle(x, y) {
            context.beginPath();
            context.rect(x, y, paddleWidth, paddleHeight);
            context.fillStyle = "white";
            context.fill();
            context.closePath();
        }

        function drawScore() {
            context.font = "16px Arial";
            context.fillText("Player: " + playerScore, 8, 20);
            context.fillText("Computer: " + computerScore, canvas.width - 100, 20);
        }

        function collisionDetection() {
            // Player paddle collision
            if (x + ballRadius > canvas.width - paddleWidth && (y > paddleY && y < paddleY + paddleHeight)) {
                dx = -dx;
            } 
            // Computer paddle collision
            if (x - ballRadius < paddleWidth && (y > rightPaddleY && y < rightPaddleY + paddleHeight)) {
                dx = -dx;
            }
            // Ball out of bounds
            if (x + ballRadius > canvas.width) {
                computerScore++;
                resetBall();
            } else if (x - ballRadius < 0) {
                playerScore++;
                resetBall();
            }
        }

        function resetBall() {
            x = canvas.width / 2;
            y = canvas.height / 2;
            dx = -dx;
        }

        function computerAI() {
            if (y < rightPaddleY + paddleHeight / 2) {
                rightPaddleY -= 4;
            } else if (y > rightPaddleY + paddleHeight / 2) {
                rightPaddleY += 4;
            }
            // Prevent computer paddle from going out of bounds
            if (rightPaddleY < 0) {
                rightPaddleY = 0;
            } else if (rightPaddleY > canvas.height - paddleHeight) {
                rightPaddleY = canvas.height - paddleHeight;
            }
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            drawBall();
            drawPaddle(0, paddleY);
            drawPaddle(canvas.width - paddleWidth, rightPaddleY);
            drawScore();
            collisionDetection();
            computerAI();

            x += dx;
            y += dy;

            // Ball wall collision
            if (y + dy > canvas.height - ballRadius || y + dy < ballRadius) {
                dy = -dy;
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
